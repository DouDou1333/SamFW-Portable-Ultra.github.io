<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S21 FE / i113 - TOTAL CONTROL OMEGA (SIMU)</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">

  <style>
    :root {
      --neon: #00ff41;
      --bg: #050505;
      --gold: #ffd700;
      --auto: #00ffff;
      --nuke: #ff00ff;
    }
    body {
      margin: 0;
      padding: 10px;
      background: var(--bg);
      color: #ddd;
      font-family: monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .status-bar {
      background: #002200;
      padding: 8px;
      text-align: center;
      font-weight: bold;
      border-bottom: 1px solid #0f0;
    }
    #console {
      flex-grow: 1;
      border: 1px solid #0f0;
      padding: 10px;
      overflow-y: auto;
      background: #000;
      margin: 10px 0;
    }
    .log {
      border-left: 2px solid #222;
      padding-left: 8px;
      margin: 4px 0;
    }
    .success { color: var(--gold); }
    .err { color: #ff4444; }
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }
    .tool-box {
      border: 1px solid var(--neon);
      border-radius: 6px;
      padding: 12px;
      background: rgba(0,255,65,0.03);
    }
    .tool-box h4 {
      margin: -8px -8px 8px -8px;
      padding: 8px;
      background: rgba(0,255,65,0.1);
      text-align: center;
    }
    button {
      background: rgba(0,255,65,0.05);
      border: 1px solid var(--neon);
      color: var(--neon);
      padding: 10px 16px;
      margin: 4px;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover {
      background: var(--neon);
      color: #000;
    }
    .btn-nuke { border-color: #ff00ff; color: #ff00ff; }
    .btn-auto { border-color: var(--auto); color: var(--auto); }
    input {
      background: #000;
      border: 1px solid #333;
      color: #0f0;
      padding: 8px;
      width: 70%;
    }
  </style>
</head>
<body>

  <div class="status-bar">
    <span>CORE_V17_LOG_MONITOR_OMEGA</span>
    <span id="devStatus" style="color: #888; margin-left: 20px;">DISCONNECTED</span>
  </div>

  <div id="console"></div>

  <div class="tool-grid">

    <div class="tool-box" style="grid-column: span 2;">
      <h4>⚡ SYNC MATÉRIELLE</h4>
      <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
        <button onclick="debugSamsungUSB()">SCAN SAMSUNG (521 FE)</button>
        <button onclick="manager.disconnectDev()">DISCONNECT</button>
      </div>
    </div>

    <div class="tool-box">
      <h4>🤖 AUTO-PILOT + MONITOR</h4>
      <button class="btn-auto" id="autoBtn" onclick="toggelleAutoPilot()">ACTIVER AUTO-PILOT</button>
    </div>

    <div class="tool-box">
      <h4>🔒 ACCÈS FORCÉ SYSTÈME</h4>
      <button onclick="inject('shell:am start -n com.android.settings/.Settings')">OUVRIR PARAMÈTRES</button>
      <button onclick="inject('shell:am force-stop com.samsung.android.app.galaxyfinder')">KILL GALAXY FINDER</button>
      <button class="btn-nuke" onclick="nukeSystem()">NUKE SYSTÈME</button>
    </div>

    <div class="tool-box">
      <h4>🚀 ROOT & KG BYPASS</h4>
      <button onclick="inject('reboot bootloader')">REBOOT BOOTLOADER</button>
      <button onclick="inject('shell:am start -a android.intent.action.VIEW -d https://samfw.com')">SAMFW FRP</button>
      <button onclick="inject('shell:settings put global adb_enabled 1')">ADB ENABLE</button>
    </div>

    <div class="tool-box" style="grid-column: span 2;">
      <h4>📱 iPHONE 13 ENGINE</h4>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        <button style="color:white;" onclick="appleDiag('DFU')">ENTRER DFU</button>
        <button style="color:white;" onclick="appleDiag('RECOVERY')">ENTRER RECOVERY</button>
        <button style="color:white;" onclick="appleDiag('EXIT')">SORTIR MODE</button>
      </div>
    </div>

    <div class="tool-box" style="grid-column: span 2;">
      <h4>⌨ GESTION DES LOGS</h4>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <input type="text" id="manualCmd" placeholder="Commande manuelle...">
        <button onclick="injectManual()">ENVOYER</button>
        <button onclick="exportLogs()">EXPORTER LOGS</button>
        <button onclick="clearLogs()">CLEAR LOGS</button>
      </div>
    </div>

  </div>

  <script>
  class DeviceManager {
    constructor() {
      this.consoleEL = document.getElementById('console');
      this.devStatus = document.getElementById('devStatus');
      this.device = null;
      this.epOut = null;
      this.epIn = null;
      this.currentBrand = null;
      this.maxLogs = 500;
      this.logCount = 0;
      this.autoInterval = null;
      this.init();
    }

    init() {
      this.log('Outil chargé – simulation pédagogique isolée Android/Samsung', 'info');
    }

    log(message, type = 'info') {
      try {
        const d = document.createElement('div');
        d.className = `log ${type}`;
        d.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
        this.consoleEL.appendChild(d);
        this.consoleEL.scrollTop = this.consoleEL.scrollHeight;
        this.logCount++;
        if (this.logCount > this.maxLogs) {
          const first = this.consoleEL.firstChild;
          if (first) first.remove();
          this.logCount--;
        }
      } catch (e) {
        console.error('Erreur logging:', e);
      }
    }

    updateStatus(text, color = '#00ff41') {
      try {
        this.devStatus.textContent = text;
        this.devStatus.style.color = color;
      } catch (e) {
        this.log('ERREUR status: ' + e.message);
      }
    }

    async connectDev() {
      if (this.device) await this.disconnectDev();

      try {
        this.log('Mode agressif activé – tentative de connexion forcée');

        // Étape 1 : Demande l'appareil avec filtre large
        this.device = await navigator.usb.requestDevice({
          filters: [{ vendorId: 0x04e8 }]
        });

        if (!this.device) {
          throw new Error('Aucun appareil sélectionné dans la popup');
        }

        this.log(`Appareil sélectionné : ${this.device.productName || 'Samsung inconnu'}`);

        // Étape 2 : Ouverture forcée
        await this.device.open();
        this.log('Port USB ouvert avec succès');

        // Étape 3 : Sélection configuration (force 1 si possible)
        if (this.device.configuration === null) {
          await this.device.selectConfiguration(1);
          this.log('Configuration 1 forcée');
        } else {
          this.log(`Configuration active : ${this.device.configuration.configurationValue}`);
        }

        // Étape 4 : Claim agressif sur interfaces 0 à 5 + détection endpoints immédiate
        let claimed = false;
        let claimedInterface = -1;

        for (let i = 0; i < 6; i++) {
          try {
            await this.device.claimInterface(i);
            this.log(`Interface ${i} réclamée avec succès !`);

            claimed = true;
            claimedInterface = i;

            // Recherche immédiate des endpoints dans cette interface
            const config = this.device.configuration;
            if (config) {
              const intf = config.interfaces.find(ifc => ifc.interfaceNumber === i);
              if (intf) {
                const alt = intf.alternates[0];
                if (alt) {
                  this.log(`Endpoints trouvés sur interface \( {i} ( \){alt.endpoints.length} au total) :`);
                  alt.endpoints.forEach(ep => {
                    this.log(`  → EP${ep.endpointNumber} | direction: ${ep.direction} | type: ${ep.type} | packetSize: ${ep.packetSize}`);
                    if (ep.direction === 'out' && ep.type === 'bulk') {
                      this.epOut = ep;
                    }
                    if (ep.direction === 'in' && ep.type === 'bulk') {
                      this.epIn = ep;
                    }
                  });
                } else {
                  this.log('Aucun alternate setting sur cette interface');
                }
              } else {
                this.log('Interface claimée non retrouvée dans config');
              }
            }

            // Si on a trouvé au moins un IN et un OUT → on arrête là
            if (this.epIn && this.epOut) {
              break;
            }

          } catch (claimErr) {
            this.log(`Interface ${i} refusée : ${claimErr.message}`);
          }
        }

        if (!claimed) {
          throw new Error('Impossible de claimer une interface (0 à 5)');
        }

        // Étape 5 : Vérification finale des endpoints
        if (!this.epOut || !this.epIn) {
          throw new Error('Endpoints bulk IN/OUT manquants malgré claim réussi');
        }

        this.currentBrand = 'SAMSUNG';
        this.updateStatus('CONNECTÉ FORCE – OPÉRATIONNEL', '#00ff41');
        this.log(`Connexion établie → IN: EP\( {this.epIn.endpointNumber} | OUT: EP \){this.epOut.endpointNumber}`, 'success');

      } catch (e) {
        this.log(`ÉCHEC TOTAL CONNEXION: \( {e.message} ( \){e.name || 'inconnu'})`, 'err');
        this.updateStatus('ÉCHEC CONNEXION', '#ff0000');
        this.device = null;
      }
    }

    async disconnectDev() {
      if (this.device) {
        try { await this.device.close(); } catch {}
        this.device = null;
      }
      this.epIn = this.epOut = null;
      this.updateStatus('DISCONNECTED', '#888');
      this.log('Déconnexion complète');
    }

    async inject(cmd) {
      this.log(`[INJECT] ${cmd} (simulation pédagogique)`, 'success');
    }

    async nukeSystem() {
      this.log('NUKE déclenché (simulation pédagogique – aucun impact réel)', 'err');
    }

    toggleAutoPilot() {
      if (this.autoInterval) {
        clearInterval(this.autoInterval);
        this.autoInterval = null;
        this.log('AUTO-PILOT arrêté');
        return;
      }
      this.log('AUTO-PILOT activé (simulation pédagogique)');
      this.autoInterval = setInterval(() => {
        this.log('Cycle auto-pilot simulé');
      }, 15000);
    }

    injectManual() {
      const val = document.getElementById('manualCmd').value.trim();
      if (val) this.inject(val);
      document.getElementById('manualCmd').value = '';
    }

    exportLogs() { this.log('Export logs simulé'); }

    clearLogs() {
      this.consoleEL.innerHTML = '';
      this.logCount = 0;
      this.log('Logs effacés');
    }
  }

  const manager = new DeviceManager();

  // Liaison du bouton SCAN
  document.getElementById('scanBtn').addEventListener('click', () => manager.connectDev());

  // Les autres fonctions d'interface (inchangées)
  async function connectDev() { await manager.connectDev(); }
  async function disconnectDev() { await manager.disconnectDev(); }
  function toggleAutoPilot() { manager.toggleAutoPilot(); }
  async function nukeSystem() { await manager.nukeSystem(); }
  async function inject(cmd) { await manager.inject(cmd); }
  function injectManual() { manager.injectManual(); }
  function exportLogs() { manager.exportLogs(); }
  function clearLogs() { manager.clearLogs(); }

</script>

</body>
</html>
